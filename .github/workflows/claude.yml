name: Run Claude Code Base Action
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Claude Code Base Action
        uses: anthropics/claude-code-base-action@beta
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}